name: Deploy

on:
  workflow_run:
    workflows: [trade_executor, telegram_bot]
    types: [completed]
    branches: [main]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Coolify redeploy
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_URL }}/api/v1/services/x11j71l7mde2nsujipb23uky/restart"
