name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: dell-dubai
    steps:
      - name: Pull latest code
        run: |
          cd /opt/fvg-alpha-caller
          git pull origin main

      - name: Write .env from secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KRONOS_URL: ${{ secrets.KRONOS_URL }}
        run: |
          cat > /opt/fvg-alpha-caller/.env << EOF
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          DATABASE_URL=${DATABASE_URL}
          KRONOS_URL=${KRONOS_URL}
          EOF

      - name: Rebuild and restart
        run: |
          cd /opt/fvg-alpha-caller
          docker compose build --no-cache
          docker compose up -d

      - name: Verify running
        run: |
          sleep 5
          docker compose -f /opt/fvg-alpha-caller/docker-compose.yaml ps
          docker logs fvg-alpha-caller-fvg-alpha-caller-1 --tail 10
