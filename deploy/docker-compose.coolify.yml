services:
  trade_executor:
    image: ghcr.io/${GH_OWNER}/trade_executor:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      BINANCE_PROXY_URL: ${BINANCE_PROXY_URL}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    expose: ["8014"]
    networks:
      - default
      - fvg-net

  telegram_bot:
    image: ghcr.io/${GH_OWNER}/telegram_bot:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - default
      - fvg-net

  dashboard:
    image: ghcr.io/${GH_OWNER}/dashboard:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      EXECUTOR_URL: http://trade_executor:8014
      NEXT_PUBLIC_BOT_USERNAME: ${BOT_USERNAME}
    expose: ["3000"]
    networks:
      - default
      - fvg-net
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fvglive.rule=Host(`${DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.fvglive.entrypoints=https"
      - "traefik.http.routers.fvglive.tls.certresolver=letsencrypt"
      - "traefik.http.services.fvglive.loadbalancer.server.port=3000"

networks:
  default:
  fvg-net:
    external: true
    name: n1hxl7f2x39ecqjths0u6446
  coolify:
    external: true
