services:
  fvg-alpha-caller:
    build: .
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DATABASE_URL=${DATABASE_URL}
      - MODEL_URL=${MODEL_URL}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - default
      - coolify
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
  coolify:
    external: true
    name: n1hxl7f2x39ecqjths0u6446
